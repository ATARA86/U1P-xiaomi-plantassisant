# openocd/gd32f470zk.cfg
# OpenOCD configuration for GD32F470ZK
#   Adapter : CMSIS-DAP (DAPLink / MCULINK / any HID-based CMSIS-DAP probe)
#   Target  : GD32F470ZK  (uses stm32f4x driver, same flash geometry)
#
# Flash:
#   openocd -f gd32f470zk.cfg -c "program firmware.hex verify reset exit"
# GDB server (run in one terminal, then arm-none-eabi-gdb in another):
#   openocd -f gd32f470zk.cfg

# -- Adapter -----------------------------------------------------------------
source [find interface/cmsis-dap.cfg]
transport select swd
adapter speed 100
# 过低速度可让 OpenOCD 不再被 target cfg 覆盖（用 -c 在后面再设一次）


# -- Target ------------------------------------------------------------------
# GD32F470ZK: Cortex-M4, 3 MB Flash @ 0x08000000, 192 KB SRAM @ 0x20000000
#             64 KB TCM @ 0x10000000  (used as work-area for faster programming)
source [find target/stm32f4x.cfg]

# reset_config 含义:
#   none              : OpenOCD 不主动驱动 SRST（不复位目标，让它自然上电运行）
#   connect_deassert_srst : 连接时释放 SRST（让目标退出复位）
# 注：GD32F470 上 srst_only 在某些 CMSIS-DAP 上会把 NRST 卡在低电平，
#     导致 nRESET=0 → SWD 读不到 IDR。这里改成最保守的 none。
reset_config none

